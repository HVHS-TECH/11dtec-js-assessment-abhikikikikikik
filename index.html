<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Masa & Lime</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/masaandlimelogo.jpg" />
  </head>

  <!-- //*** AI Generated Image -->

  <body>
    <header class="top-bar">
      <a href="index.html">
        <img
          src="images/masaandlimelogo.jpg"
          class="logo"
          alt="Masa & Lime Logo"
        />
      </a>

      <nav class="main-nav">
        <div class="nav-item dropdown">
          <span class="dropdown-trigger">Main Dishes</span>
          <div class="dropdown-menu">
            <a href="meat.html">Meat</a>
            <a href="seafood.html">Seafood</a>
            <a href="vegetarian.html">Vegetarian</a>
          </div>
        </div>

        <div class="nav-item">
          <a href="drinks.html">Drinks</a>
        </div>

        <div class="nav-item">
          <a href="sides.html">Sides</a>
        </div>

        <div class="nav-item">
          <a href="checkout.html" class="trolley-link">
            <img
              src="images/checkouttrolley.png"
              alt="Checkout"
              class="trolley-img"
            />
          </a>
        </div>
      </nav>
    </header>
    <img
      src="images/masaandlimebanner.jpg"
      class="banner"
      alt="Coastal Mexican Food Banner"
    />

    <div class="container">
      <h1>Masa & Lime</h1>

      <div class="mainmenu-grid">
        <div class="food-card">
          <!-- // AI Generated Image -->

          <img
            src="images/tacosdepescadaseafood.png"
            alt="Fish and shrimp tacos"
          />
          <div class="card-info">
            <h3>Fish Tacos</h3>
            <p>Crispy fish with cabbage slaw and chipotle mayo.</p>
          </div>
        </div>

        <div class="food-card">
          <!-- // AI Generated Image -->

          <img
            src="images/pescadozarandeadoseafood.png"
            alt="Mexican Char-Grilled Fish"
          />
          <div class="card-info">
            <h3>Mexican Char-Grilled Fish</h3>
            <p>
              Traditional split grilled fish marinated in sweet chili paste.
            </p>
          </div>
        </div>

        <div class="food-card">
          <!-- //*** AI Generated Image -->

          <img src="images/quesabirriameat.png" alt="Quesa Birria" />
          <div class="card-info">
            <h3>Quesa Birria</h3>
            <p>Beef birria tacos folded with melted cheese and rich broth.</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
