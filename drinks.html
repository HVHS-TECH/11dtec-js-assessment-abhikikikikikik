<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drinks</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/masaandlimelogo.jpg" />
  </head>

  <body>
    <header class="top-bar">
      <img
        src="images/masaandlimelogo.jpg"
        class="logo"
        alt="Masa & Lime Logo"
      />

      <nav class="main-nav">
        <div class="nav-item">
          <a href="maindishes.html">Main Dishes</a>
        </div>

        <div class="nav-item">
          <a href="drinks.html">Drinks</a>
        </div>

        <div class="nav-item">
          <a href="sides.html">Sides</a>
        </div>
      </nav>
    </header>

    <img
      src="images/masaandlimebanner.jpg"
      class="banner"
      alt="Coastal Mexican Food Banner"
    />

    <div class="container">
      <h1>Masa & Lime</h1>
      <p>Welcome to our website!</p>

      <div class="mainmenu-grid">
        <div class="food-card">
          <img
            src="images/tacosdepescadaseafood.png"
            alt="Fish and shrimp tacos"
          />

            <h3>Fish Tacos</h3>
          </div>
        </div>

        <div class="food-card">
          <img
            src="images/pescadozarandeadoseafood.png"
            alt="Lime margarita drink"
          />
          <div class="card-info">
            <h3>Mexican Char-Grilled Fish</h3>
          </div>
        </div>

        <div class="food-card">
          <img
            src="images/quesabirriameat.png"
            alt="Tortilla chips and guacamole"
          />
          <div class="card-info">
            <h3>Quesa Birria</h3>
          </div>
        </div>
      </div>

    <script src="script.js"></script>
